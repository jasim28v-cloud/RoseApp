name: Build Game APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -L https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o sdk.zip
        unzip -q sdk.zip
        mv cmdline-tools latest
        rm sdk.zip
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Create Project
      run: |
        mkdir -p app/src/main/java/com/rose/game
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p gradle/wrapper

    - name: Create settings.gradle
      run: |
        cat > settings.gradle << 'EOF'
        rootProject.name = "GameApp"
        include ':app'
        EOF

    - name: Create build.gradle
      run: |
        cat > build.gradle << 'EOF'
        plugins { id 'com.android.application' version '8.2.2' apply false }
        EOF

    - name: Create gradle.properties
      run: |
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m
        android.useAndroidX=true
        EOF

    - name: Create local.properties
      run: echo "sdk.dir=$HOME/android-sdk" > local.properties

    - name: Create app/build.gradle
      run: |
        cat > app/build.gradle << 'EOF'
        plugins { id 'com.android.application' }
        android {
            namespace 'com.rose.game'
            compileSdk 34
            defaultConfig {
                applicationId "com.rose.game"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
        }
        dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
        EOF

    - name: Create AndroidManifest.xml
      run: |
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" android:label="Guess Game" android:theme="@style/Theme.Game">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Create MainActivity.java
      run: |
        cat > app/src/main/java/com/rose/game/MainActivity.java << 'EOF'
        package com.rose.game;
        import android.os.Bundle;
        import android.view.View;
        import android.widget.*;
        import androidx.appcompat.app.AppCompatActivity;
        import java.util.Random;
        public class MainActivity extends AppCompatActivity {
            int target, attempts = 0;
            TextView title, hint, attemptsText;
            EditText input;
            Button guessBtn, newGameBtn;
            @Override
            protected void onCreate(Bundle b) {
                super.onCreate(b);
                setContentView(R.layout.activity_main);
                title = findViewById(R.id.title);
                hint = findViewById(R.id.hint);
                attemptsText = findViewById(R.id.attempts);
                input = findViewById(R.id.input);
                guessBtn = findViewById(R.id.guessBtn);
                newGameBtn = findViewById(R.id.newGameBtn);
                newGame();
                guessBtn.setOnClickListener(v -> checkGuess());
                newGameBtn.setOnClickListener(v -> newGame());
            }
            void newGame() {
                target = new Random().nextInt(100) + 1;
                attempts = 0;
                hint.setText("🤔 خمن رقم بين 1 و 100");
                attemptsText.setText("المحاولات: 0");
                input.setText("");
                input.setEnabled(true);
                guessBtn.setEnabled(true);
                title.setText("🎮 لعبة التخمين");
            }
            void checkGuess() {
                String s = input.getText().toString();
                if (s.isEmpty()) { Toast.makeText(this, "اكتب رقم!", Toast.LENGTH_SHORT).show(); return; }
                int g = Integer.parseInt(s);
                attempts++;
                attemptsText.setText("المحاولات: " + attempts);
                if (g < target) hint.setText("📈 أكبر! الرقم أكبر من " + g);
                else if (g > target) hint.setText("📉 أصغر! الرقم أصغر من " + g);
                else {
                    hint.setText("🎉 صح! الرقم هو " + target);
                    title.setText("🏆 فزت في " + attempts + " محاولة!");
                    input.setEnabled(false);
                    guessBtn.setEnabled(false);
                    Toast.makeText(this, "مبروك!", Toast.LENGTH_LONG).show();
                }
                input.setText("");
            }
        }
        EOF

    - name: Create Layout
      run: |
        cat > app/src/main/res/layout/activity_main.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:gravity="center"
            android:padding="32dp" android:background="#1a1a2e">
            <TextView android:id="@+id/title" android:layout_width="wrap_content"
                android:layout_height="wrap_content" android:text="🎮 لعبة التخمين"
                android:textSize="28sp" android:textColor="#e94560" android:textStyle="bold"
                android:layout_marginBottom="40dp"/>
            <TextView android:id="@+id/hint" android:layout_width="wrap_content"
                android:layout_height="wrap_content" android:text="🤔 خمن رقم بين 1 و 100"
                android:textSize="20sp" android:textColor="#FFFFFF"
                android:layout_marginBottom="30dp" android:gravity="center"/>
            <EditText android:id="@+id/input" android:layout_width="200dp"
                android:layout_height="56dp" android:inputType="number"
                android:textColor="#FFFFFF" android:textColorHint="#888"
                android:hint="أدخل رقم" android:textSize="22sp" android:gravity="center"
                android:background="@drawable/input_bg" android:layout_marginBottom="20dp"/>
            <Button android:id="@+id/guessBtn" android:layout_width="200dp"
                android:layout_height="52dp" android:text="🎯 خمن"
                android:textSize="18sp" android:textColor="#FFFFFF"
                android:backgroundTint="#e94560" android:layout_marginBottom="12dp"/>
            <TextView android:id="@+id/attempts" android:layout_width="wrap_content"
                android:layout_height="wrap_content" android:text="المحاولات: 0"
                android:textSize="16sp" android:textColor="#aaa"
                android:layout_marginBottom="24dp"/>
            <Button android:id="@+id/newGameBtn" android:layout_width="160dp"
                android:layout_height="44dp" android:text="🔄 لعبة جديدة"
                android:textSize="14sp" android:textColor="#FFFFFF"
                android:backgroundTint="#0f3460"/>
        </LinearLayout>
        EOF

    - name: Create Drawable
      run: |
        mkdir -p app/src/main/res/drawable
        cat > app/src/main/res/drawable/input_bg.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#16213e"/>
            <stroke android:width="2dp" android:color="#e94560"/>
            <corners android:radius="12dp"/>
        </shape>
        EOF

    - name: Create Theme
      run: |
        cat > app/src/main/res/values/themes.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.Game" parent="Theme.AppCompat.Light.NoActionBar">
                <item name="android:statusBarColor">#1a1a2e</item>
                <item name="android:windowBackground">#1a1a2e</item>
            </style>
        </resources>
        EOF

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Game-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
